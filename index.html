<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Controle Financeiro</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon_io/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="favicon_io/android-chrome-512x512.png">
</head>

<body>

<div class="top-bar">
  <h2>💰 Controle</h2>
  <div class="gear" onclick="abrirConfig()">⚙️</div>
</div>

<div class="card">

  <label>Mês</label>
  <select id="mes"></select>

  <label>Cartão</label>
  <select id="cartao">
    <option value="C">Caixa</option>
    <option value="BB">Banco do Brasil</option>
    <option value="N">Nubank</option>
  </select>

  <label>Descrição</label>
  <input type="text" id="descricao">

  <label>Tipo</label>
  <div class="radio-group">
    <label class="radio-item">
      <input type="radio" name="tipo" value="avista" checked>
      <span>À vista</span>
    </label>
    <label class="radio-item">
      <input type="radio" name="tipo" value="parcelado">
      <span>Parcelado</span>
    </label>
    <label class="radio-item">
      <input type="radio" name="tipo" value="recorrente">
      <span>Recorrente</span>
    </label>
  </div>

  <div id="parcelasDiv" style="display:none;">
    <label>Parcelas</label>
    <input type="number" id="parcelas" min="1">
  </div>

  <label>Valor</label>
  <input type="number" id="valor">

  <button onclick="salvar()">Salvar</button>

</div>
<div id="configBox" class="card" style="display:none;">
  <h3>Configurações</h3>

  <label>Mês</label>
  <select id="configMes">
    <option value="1">Janeiro</option>
    <option value="2">Fevereiro</option>
    <option value="3">Março</option>
    <option value="4">Abril</option>
    <option value="5">Maio</option>
    <option value="6">Junho</option>
    <option value="7">Julho</option>
    <option value="8">Agosto</option>
    <option value="9">Setembro</option>
    <option value="10">Outubro</option>
    <option value="11">Novembro</option>
    <option value="12">Dezembro</option>
  </select>

  <label>Ano</label>
  <input type="number" id="configAno" placeholder="2026">

  <button onclick="criarMes()">Criar mês</button>
  <button onclick="ocultarMes()">Ocultar mês</button>
</div>
<script src="js/script.js"></script>

</body>
</html>
