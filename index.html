<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Controle Financeiro</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="top-bar">
  <h2>💰 Controle</h2>
  <div class="gear" onclick="abrirConfig()">⚙️</div>
</div>

<div class="card">

  <label>Mês</label>
  <select id="mes"></select>

  <label>Cartão</label>
  <select id="cartao">
    <option value="C">Caixa</option>
    <option value="BB">Banco do Brasil</option>
    <option value="N">Nubank</option>
  </select>

  <label>Descrição</label>
  <input type="text" id="descricao">

  <label>Tipo</label>
  <div class="radio-group">
    <label><input type="radio" name="tipo" value="avista" checked> À vista</label>
    <label><input type="radio" name="tipo" value="parcelado"> Parcelado</label>
    <label><input type="radio" name="tipo" value="recorrente"> Recorrente</label>
  </div>

  <div id="parcelasDiv" style="display:none;">
    <label>Parcelas</label>
    <input type="number" id="parcelas" min="1">
  </div>

  <label>Valor</label>
  <input type="number" id="valor">

  <button onclick="salvar()">Salvar</button>

</div>

<script src="js/script.js"></script>

</body>
</html>
